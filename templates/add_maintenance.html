{% extends "base.html" %}

{% block content %}

<h2>Add Maintenance</h2>

<form method="POST">

    <input type="date" name="maintenance_date" required>
    <input name="technician_name" placeholder="Technician Name" required>
    <textarea name="issue" placeholder="Issue" required></textarea>
    <textarea name="resolution" placeholder="Resolution" required></textarea>
    <input type="date" name="next_due_date" required>

    <button type="submit">Save</button>

</form>

{% endblock %}
